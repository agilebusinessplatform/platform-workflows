name: mirror-to-gitlab

on:
  workflow_call:
    inputs:
      gitlab_host:
        required: true
        type: string
      gitlab_project_path:
        required: true
        type: string
    secrets:
      GITLAB_MIRROR_TOKEN:
        required: true

jobs:
  mirror:
    runs-on: ubuntu-latest
    concurrency:
      group: mirror-${{ github.repository }}
      cancel-in-progress: false
    permissions:
      contents: read

    steps:
      - name: Mirror branches and tags to GitLab
        shell: bash
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          GITLAB_HOST: ${{ inputs.gitlab_host }}
          GITLAB_PROJECT_PATH: ${{ inputs.gitlab_project_path }}
          GITLAB_TOKEN: ${{ secrets.GITLAB_MIRROR_TOKEN }}
        run: |
          set -euo pipefail

          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "$tmp_dir"' EXIT

          cd "$tmp_dir"
          git init --bare repo.git
          cd repo.git

          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git"

          git fetch --prune origin \
            '+refs/heads/*:refs/heads/*' \
            '+refs/tags/*:refs/tags/*'

          git remote add gitlab "https://oauth2:${GITLAB_TOKEN}@${GITLAB_HOST}/${GITLAB_PROJECT_PATH}.git"

          git push --prune gitlab \
            '+refs/heads/*:refs/heads/*' \
            '+refs/tags/*:refs/tags/*'
